<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>野球成績記録アプリ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header id="appHeader">
    <h1>⚾ 野球成績記録</h1>
  </header>

  <!-- ホーム画面 -->
  <section id="view-home" class="view">
    <div class="btn-row">
      <button class="btn btn-primary" id="btnNewGame">新しい試合を開始</button>
      <button class="btn" id="btnPlayers">選手管理</button>
      <button class="btn" id="btnUniforms">ユニフォーム管理</button>
      <button class="btn" id="btnAggregate">集計してCSV出力</button>
    </div>
    <h2>試合一覧</h2>
    <div id="gameList"></div>
  </section>

  <!-- 選手管理画面 -->
  <section id="view-players" class="view hidden">
    <button class="btn btn-back" data-back="view-home">← 戻る</button>
    <h2>選手管理</h2>
    <form id="addPlayerForm" class="inline-form">
      <input type="text" id="newPlayerName" placeholder="選手名" required>
      <button type="submit" class="btn btn-primary">追加</button>
    </form>
    <div id="playerList"></div>
  </section>

  <!-- ユニフォーム管理画面 -->
  <section id="view-uniforms" class="view hidden">
    <button class="btn btn-back" data-back="view-home">← 戻る</button>
    <h2>ユニフォーム管理</h2>
    <div id="uniformList"></div>
  </section>

  <!-- 試合セットアップ画面 -->
  <section id="view-setup" class="view hidden">
    <button class="btn btn-back" data-back="view-home">← 戻る</button>
    <h2>試合セットアップ</h2>
    <div class="inline-form">
      <label>日付 <input type="date" id="setupDate"></label>
      <label>対戦相手 <input type="text" id="setupOpponent" placeholder="対戦相手名"></label>
    </div>
    <div class="inline-form">
      <select id="setupPlayerSelect"></select>
      <select id="setupPositionSelect">
        <option value="投手">投手</option>
        <option value="捕手">捕手</option>
        <option value="一塁">一塁</option>
        <option value="二塁">二塁</option>
        <option value="三塁">三塁</option>
        <option value="遊撃">遊撃</option>
        <option value="左翼">左翼</option>
        <option value="中堅">中堅</option>
        <option value="右翼">右翼</option>
        <option value="DH">DH</option>
      </select>
      <button class="btn" id="btnAddLineup">打順に追加</button>
    </div>
    <h3>打順</h3>
    <div id="setupLineupList"></div>
    <button class="btn btn-primary btn-large" id="btnStartGame">試合開始</button>
  </section>

  <!-- 試合詳細・ライブ入力画面 -->
  <section id="view-game" class="view hidden">
    <button class="btn btn-back" data-back="view-home">← 試合一覧へ</button>
    <div id="gameHeaderInfo"></div>

    <div class="current-batter-box">
      <div class="label">現在の打者</div>
      <div id="currentBatterName" class="current-batter-name">-</div>
    </div>

    <div class="outcome-grid" id="outcomeButtons">
      <button class="btn outcome outcome-hit" data-type="single">単打</button>
      <button class="btn outcome outcome-hit" data-type="double">二塁打</button>
      <button class="btn outcome outcome-hit" data-type="triple">三塁打</button>
      <button class="btn outcome outcome-hr" data-type="homerun">本塁打</button>
      <button class="btn outcome outcome-walk" data-type="walk">四球</button>
      <button class="btn outcome outcome-walk" data-type="hbp">死球</button>
      <button class="btn outcome outcome-out" data-type="strikeout">三振</button>
      <button class="btn outcome outcome-out" data-type="out">その他アウト</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-warn" id="btnUndo">直前を取り消す</button>
      <button class="btn" id="btnSteal">盗塁を記録</button>
      <button class="btn" id="btnError">エラーを記録</button>
    </div>

    <h3>打順・選手交代</h3>
    <div id="lineupDisplay"></div>

    <h3>記録一覧</h3>
    <div id="eventLog"></div>

    <button class="btn btn-danger" id="btnDeleteGame">この試合を削除</button>
  </section>

  <!-- 集計・CSV出力画面 -->
  <section id="view-aggregate" class="view hidden">
    <button class="btn btn-back" data-back="view-home">← 戻る</button>
    <h2>集計・CSV出力</h2>
    <div id="aggregateGameList"></div>
    <button class="btn btn-primary btn-large" id="btnGenerateCsv">CSVを出力</button>
  </section>

</div>

<!-- 汎用モーダル -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-box" id="modalBox"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
